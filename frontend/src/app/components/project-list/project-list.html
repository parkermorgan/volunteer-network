<div class="container">
  <h2>Available Volunteer Projects</h2>
  
  <div *ngIf="projects.length === 0" class="no-projects">
    <p>No projects found. Be the first to create one!</p>
  </div>

  <div class="project-grid">
    <div *ngFor="let project of projects" class="project-card" [class.filled]="project.status === 'Filled'">
      <div class="card-header">
        <h3>{{ project.title }}</h3>
        <span class="status-badge" [class.open]="project.status === 'Open'">
          {{ project.status }}
        </span>
      </div>
      
      <p class="description">{{ project.description }}</p>
      
      <p><strong>Location:</strong> {{ project.location }}</p>
      
      <div class="skills">
        <strong>Required Skills:</strong>
        <span *ngFor="let skill of project.requiredSkills" class="skill-tag">
          {{ skill }}
        </span>
      </div>

      <div class="actions">
        <button class="btn btn-edit">Edit</button>
        <button class="btn btn-delete" (click)="deleteProject(project._id)">Delete</button>
      </div>
    </div>
  </div>
</div>
