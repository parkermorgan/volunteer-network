<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="display-6">Available Volunteer Projects</h2>
    <span class="badge bg-secondary">{{ projects.length }} Projects Found</span>
  </div>
  
  <div *ngIf="projects.length === 0" class="alert alert-light text-center border p-5 shadow-sm">
    <i class="bi bi-search display-4 text-muted d-block mb-3"></i>
    <p class="lead">No projects found. Be the first to create one!</p>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    <div *ngFor="let project of projects" class="col">
      <div class="card h-100 shadow-sm border-0 shadow-hover" 
           [class.opacity-75]="project.status === 'Filled'">
        
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h3 class="card-title h5 mb-0 text-primary">{{ project.title }}</h3>
            <span class="badge rounded-pill" 
                  [class.bg-success]="project.status === 'Open'"
                  [class.bg-danger]="project.status === 'Filled'">
              {{ project.status }}
            </span>
          </div>
          
          <p class="card-text text-muted small mb-3">{{ project.description }}</p>
          
          <div class="mb-3">
            <small class="text-uppercase fw-bold text-muted" style="font-size: 0.7rem;">Location</small>
            <div class="d-flex align-items-center">
              <i class="bi bi-geo-alt-fill text-danger me-2"></i>
              <span>{{ project.location }}</span>
            </div>
          </div>
          
          <div class="mb-4">
            <small class="text-uppercase fw-bold text-muted d-block mb-2" style="font-size: 0.7rem;">Skills</small>
            <span *ngFor="let skill of project.requiredSkills" 
                  class="badge border text-dark fw-normal me-1">
              {{ skill }}
            </span>
          </div>
        </div>

        <div class="card-footer bg-transparent border-top-0 d-flex gap-2 pb-3">
          <button class="btn btn-outline-primary btn-sm flex-grow-1">
            <i class="bi bi-pencil-square me-1"></i> Edit
          </button>
          <button class="btn btn-outline-danger btn-sm flex-grow-1" (click)="deleteProject(project._id)">
            <i class="bi bi-trash me-1"></i> Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
