<div class="form-container">
  <h2>Create a New Volunteer Project</h2>
  
  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="title">Project Title</label>
      <input id="title" type="text" formControlName="title" placeholder="e.g. Build Food Bank Website">
      <div *ngIf="projectForm.get('title')?.touched && projectForm.get('title')?.invalid" class="error">
        Title is required (minimum 5 characters).
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="4" placeholder="Describe the project objective..."></textarea>
      <div *ngIf="projectForm.get('description')?.touched && projectForm.get('description')?.invalid" class="error">
        Description is required (minimum 10 characters).
      </div>
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" type="text" formControlName="location" placeholder="e.g. Remote, or Rexburg, ID">
      <div *ngIf="projectForm.get('location')?.touched && projectForm.get('location')?.invalid" class="error">
        Location is required.
      </div>
    </div>

    <div class="form-group">
      <label for="skillsInput">Required Skills</label>
      <div class="skills-input-group">
        <input id="skillsInput" type="text" formControlName="skillsInput" placeholder="e.g. Angular (Press Add)">
        <button type="button" class="btn btn-secondary" (click)="addSkill()">Add Skill</button>
      </div>

      <div class="skills-tags" style="margin-top: 10px;">
        <span *ngFor="let skill of projectForm.get('requiredSkills')?.value" class="tag">
          {{ skill }} <span class="remove-tag" (click)="removeSkill(skill)">×</span>
        </span>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="projectForm.invalid || isSubmitting">
      {{ isSubmitting ? 'Posting...' : 'Post Project' }}
    </button>

  </form>
</div>
